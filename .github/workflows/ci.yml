name: Run Python Tests
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    env:
      PMIP_CBC_LIBRARY: "/home/runner/build/dist/lib/libCbc.so"
    steps:
      - uses: actions/checkout@v3
      - name: Install Python 3
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install .[test]
          python -c "
            import sys, subprocess
            if sys.version_info < (3, 12):
                subprocess.check_call(['pip', 'install', '.[mip]'])
          "
      # Only build CBC for Python < 3.12
      - name: Compile CBC binary
        if: ${{ matrix.python-version == '3.9' || matrix.python-version == '3.10' || matrix.python-version == '3.11' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ gfortran libgfortran-9-dev liblapack-dev \
            libamd2 libcholmod3 libmetis-dev libsuitesparse-dev \
            libnauty2-dev git
          mkdir -p ~/build
          cd ~/build
          wget -nH https://raw.githubusercontent.com/coin-or/coinbrew/master/coinbrew
          bash coinbrew fetch Cbc@master --no-prompt --skip-update
          bash coinbrew build Cbc@stable/2.10 --no-prompt --tests=none

      - name: Run tests with pytest
        run: |
          cd odtlearn/tests
          pytest -v
