name: Sphinx documentation build

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.x'
      - name: Install pandoc and LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra dvipng texlive-fonts-recommended
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install .[docs,cbc]
      # Only build CBC for Python < 3.12
      - name: Compile CBC binary
        if: ${{ matrix.python-version == '3.9' || matrix.python-version == '3.10' || matrix.python-version == '3.11' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gfortran \
            liblapack-dev libsuitesparse-dev libmetis-dev \
            libnauty-dev git
          mkdir -p ~/build
          cd ~/build
          wget -nH https://raw.githubusercontent.com/coin-or/coinbrew/master/coinbrew
          bash coinbrew fetch Cbc@master --no-prompt --skip-update
          bash coinbrew build Cbc@stable/2.10 --no-prompt --tests=none
      - name: Build package
        run: python -m build
      - name: Build HTML
        run: |
          cd docs
          make html
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/_build/html/
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html