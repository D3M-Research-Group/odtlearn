name: Sphinx documentation build

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.x'
      - name: Install pandoc and LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra dvipng texlive-fonts-recommended
      - name: Compile CBC binary
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gfortran \
            liblapack-dev libsuitesparse-dev libmetis-dev \
            libnauty-dev git
          mkdir -p ~/build
          cd ~/build
          wget -nH https://raw.githubusercontent.com/coin-or/coinbrew/master/coinbrew
          bash coinbrew fetch Cbc@stable/2.10 --no-prompt --skip-update
          bash coinbrew build Cbc@stable/2.10 --no-prompt --tests=none
      - name: Inspect CBC build
        run: |
          find ~/build -name "libCbc*" -o -name "libCbcSolver*"
          find ~/build -name "cbc"
      - name: Configure CBC
        run: |
          echo "$HOME/build/dist/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$HOME/build/dist/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "CBC_LIBRARY=$HOME/build/dist/lib/libCbcSolver.so" >> $GITHUB_ENV
      - name: Verify CBC environment
        run: |
          echo "PATH=$PATH"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          ls -l $HOME/build/dist/lib/libCbcSolver.so
          ldd $HOME/build/dist/lib/libCbcSolver.so
          which cbc
          cbc --version
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install .[docs,cbc,visualization]
      - name: Test CBC
        run: |
          python - <<EOF
          import os
          print("LD_LIBRARY_PATH:", os.environ.get("LD_LIBRARY_PATH"))

          from mip import Model, CBC

          model = Model(solver_name=CBC)
          print("CBC loaded successfully")
          EOF
      - name: Build package
        run: python -m build
      - name: Build HTML
        run: |
          cd docs
          make html
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/_build/html/
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html